    <link rel="stylesheet" href="https://unpkg.com/reactflow@11.11.4/dist/style.css" />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'autro-blue': '#0F172A', // Slate 900 for a more pro look
              'autro-primary': '#2563EB', // Vibrant Blue
              'autro-bg': '#F8FAFC', // Slate 50
              'autro-surface': '#FFFFFF',
              'autro-border': '#E2E8F0',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            boxShadow: {
              'soft': '0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px 0 rgba(0, 0, 0, 0.03)',
              'float': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)',
            }
          }
        }
      }
    </script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    body {
      background-color: #F8FAFC;
    }
    .print-only-logo {
      display: none;
    }
    @media print {
      .print-hide {
        display: none !important;
      }
      .printable-section {
        display: block !important;
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
      }
      body > *:not(.printable-section) {
        display: none;
      }
      .print-only-logo {
        display: block !important;
      }
    }
    
    /* Scrollbar minimalista */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #CBD5E1;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94A3B8;
    }
  </style>
<link rel="stylesheet" href="/index.css">
</head>
