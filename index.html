<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <script>
      const originalError = window.console.error;
      window.console.error = function() {
          if (arguments[0] && typeof arguments[0] === 'string' && (arguments[0].includes('ResizeObserver') || arguments[0].includes('undelivered notifications'))) {
              return;
          }
          originalError.apply(console, arguments);
      };
      window.addEventListener('error', function(e) {
          if (e.message === 'ResizeObserver loop limit exceeded' || e.message === 'ResizeObserver loop completed with undelivered notifications.' || e.message.includes('undelivered notifications')) {
              e.stopImmediatePropagation();
              e.preventDefault();
              
              // Hide Vite error overlay if it was drawn
              const viteOverlay = document.querySelector('vite-error-overlay');
              if (viteOverlay) {
                  viteOverlay.remove();
              }
              return;
          }
      }, true);
    </script>
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
